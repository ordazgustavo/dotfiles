env:
  TERM: alacritty

window:
  padding:
    x: 2
    y: 2
  decorations: none
  startup_mode: Fullscreen
  dynamic_title: true

font:
  normal:
    family: 'FiraCode Nerd Font'
  size: 12.0

# Tokyo Night Storm
colors:
  primary:
    background: '0x24283b'
    foreground: '0xc0caf5'

  normal:
    black:   '0x1D202F'
    red:     '0xf7768e'
    green:   '0x9ece6a'
    yellow:  '0xe0af68'
    blue:    '0x7aa2f7'
    magenta: '0xbb9af7'
    cyan:    '0x7dcfff'
    white:   '0xa9b1d6'

  bright:
    black:   '0x414868'
    red:     '0xf7768e'
    green:   '0x9ece6a'
    yellow:  '0xe0af68'
    blue:    '0x7aa2f7'
    magenta: '0xbb9af7'
    cyan:    '0x7dcfff'
    white:   '0xc0caf5'

  indexed_colors:
    - { index: 16, color: '0xff9e64' }
    - { index: 17, color: '0xdb4b4b' }

mouse:
  hide_when_typing: true
